version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=successful_safaris
      - POSTGRES_USER=safari_user
      - POSTGRES_PASSWORD=safari_password
    ports:
      - "5432:5432"

  web:
    build: ./backend
    command: >
      bash -c "python manage.py migrate &&
               python manage.py seed_sitemap &&
               gunicorn safari_backend.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SECRET_KEY=production-secret-key-placeholder-change-me
      - DJANGO_DEBUG=False
      - DJANGO_ALLOWED_HOSTS=*
      - DATABASE_URL=postgres://safari_user:safari_password@db:5432/successful_safaris
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    depends_on:
      - db

volumes:
  postgres_data:
  static_volume:
  media_volume:
